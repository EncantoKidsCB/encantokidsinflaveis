<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Brinquedos - Encanto Kids Infláveis</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fa;
}

header{
background:white;
padding:15px 20px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:bold;
color:#0d6efd;
}

.menu a{
text-decoration:none;
margin-left:15px;
font-weight:bold;
color:#333;
}

.hero{
background:linear-gradient(135deg,#0d6efd,#ff7b00);
color:white;
text-align:center;
padding:60px 20px;
}

.container{
max-width:1200px;
margin:auto;
padding:50px 20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.imagem{
height:250px;
background:#ddd;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.content{
padding:20px;
}

.content h3{
color:#0d6efd;
margin-bottom:10px;
}

.preco{
font-size:28px;
font-weight:bold;
color:#ff7b00;
margin:15px 0;
}

.btn{
width:100%;
padding:14px;
background:#ff7b00;
color:white;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.btn:hover{
opacity:.9;
}

.top-actions{
text-align:center;
margin-bottom:30px;
}

.ver-reserva{
background:#0d6efd;
color:white;
padding:15px 25px;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.whatsapp{
position:fixed;
right:20px;
bottom:20px;
width:65px;
height:65px;
background:#25D366;
border-radius:50%;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
text-decoration:none;
color:white;
}

</style>
</head>
<body>

<header>

<div class="logo">
🎈 Encanto Kids Infláveis
</div>

<div class="menu">
<a href="index.html">Início</a>
<a href="brinquedos.html">Brinquedos</a>
<a href="carrinho.html">
📋 Sua Reserva (<span id="contador">0</span>)
</a>
</div>

</header>

<section class="hero">

<h1>Nossos Brinquedos</h1>

<p>Escolha os brinquedos para sua festa.</p>

</section>

<div class="container">

<div class="top-actions">

<a class="ver-reserva" href="carrinho.html">
📋 Ver Minha Reserva
</a>

</div>

<div class="cards">

<div class="card">

<div class="imagem">
<img src="pulapula.jpg" alt="Pula-Pula">
</div>

<div class="content">

<h3>Pula-Pula</h3>

<div class="preco">
R$ 149,99
</div>

<button class="btn"
onclick="adicionar('Pula-Pula',149.99)">
Reservar Agora
</button>

</div>

</div>

<div class="card">

<div class="imagem">
<img src="toboga.jpg" alt="toboga-inflável">
</div>

<div class="content">

<h3>Tobogã Inflável</h3>

<div class="preco">
R$ 149,99
</div>

<button class="btn"
onclick="adicionar('Tobogã Inflável',149.99)">
Reservar Agora
</button>

</div>

</div>

<div class="card">

<div class="imagem">
<img src="castelo.jpg" alt="Castelo Inflável">
</div>

<div class="content">

<h3>Castelo com Piscina de Bolinhas</h3>

<div class="preco">
R$ 149,99
</div>

<button class="btn"
onclick="adicionar('Castelo com Piscina de Bolinhas',149.99)">
Reservar Agora
</button>

</div>

</div>

</div>

</div>

<a
class="whatsapp"
href="https://wa.me/5519989046698"
target="_blank">
📱
</a>

<script>

let reserva =
JSON.parse(localStorage.getItem('reserva')) || [];

atualizarContador();

function adicionar(nome,preco){

reserva.push({
nome:nome,
preco:preco
});

localStorage.setItem(
'reserva',
JSON.stringify(reserva)
);

atualizarContador();

alert('✅ Produto adicionado à sua reserva!');

}

function atualizarContador(){

document.getElementById('contador').innerText =
reserva.length;

}

</script>

</body>
</html>
