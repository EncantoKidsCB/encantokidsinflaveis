<script>

const fotos={

pulapula:[
'pulapula1.jpg',
'pulapula2.jpg',
'pulapula3.jpg'
],

toboga:[
'toboga1.jpg',
'toboga2.jpg',
'toboga3.jpg'
],

castelo:[
'castelo1.jpg',
'castelo2.jpg',
'castelo3.jpg'
]

};

const indice={
pulapula:0,
toboga:0,
castelo:0
};

function trocar(nome,direcao){

indice[nome]+=direcao;

if(indice[nome]<0){
indice[nome]=fotos[nome].length-1;
}

if(indice[nome]>=fotos[nome].length){
indice[nome]=0;
}

document.getElementById(nome).src=
fotos[nome][indice[nome]];

}

let reserva=
JSON.parse(localStorage.getItem('reserva'))||[];

atualizarContador();

function adicionar(nome,preco){

reserva.push({
nome:nome,
preco:preco
});

localStorage.setItem(
'reserva',
JSON.stringify(reserva)
);

atualizarContador();

alert('✅ Brinquedo adicionado à reserva!');

}

function atualizarContador(){

document.getElementById('contador').innerText=
reserva.length;

}

</script>
